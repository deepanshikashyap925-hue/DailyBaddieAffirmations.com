<!DOCTYPE html>
<html lang="en">
<head>

<title>SHE SPEAKS — Affirmation Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #080608;
    --deep: #0e0810;
    --plum: #1a0a1e;
    --wine: #3b0a2a;
    --rose-dark: #5c1a3a;
    --rose: #8b2252;
    --blush: #c4527a;
    --gold: #c9a96e;
    --gold-light: #e8d5a3;
    --cream: #f5ede0;
    --mist: rgba(245,237,224,0.06);
    --glow: rgba(196,82,122,0.15);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s;
    mix-blend-mode: screen;
  }
  .cursor-ring {
    position: fixed;
    width: 32px; height: 32px;
    border: 1px solid rgba(201,169,110,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: all 0.18s ease;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
    opacity: 0.6;
  }

  /* Ambient gradient orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(91,26,58,0.35), transparent 70%);
    top: -100px; left: -100px;
    animation-delay: 0s;
  }
  .orb-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(59,10,42,0.4), transparent 70%);
    bottom: -50px; right: -100px;
    animation-delay: -4s;
  }
  .orb-3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(201,169,110,0.08), transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    animation-delay: -8s;
  }

  @keyframes drift {
    0% { transform: translate(0,0) scale(1); }
    100% { transform: translate(30px, 20px) scale(1.05); }
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 60px 20px 20px;
  }

  .site-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 6px;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 16px;
    animation: fadeUp 1s ease both;
  }

  .site-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(36px, 8vw, 80px);
    font-weight: 600;
    letter-spacing: 8px;
    background: linear-gradient(135deg, var(--cream) 0%, var(--gold-light) 40%, var(--blush) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    animation: fadeUp 1s ease 0.15s both;
  }

  .site-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(14px, 2.5vw, 20px);
    color: rgba(245,237,224,0.45);
    margin-top: 12px;
    letter-spacing: 2px;

  .header-line {
    width: 1px;

    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    margin: 30px auto 0;
    animation: fadeUp 1s ease 0.45s both;

  /* Main card area */

    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;

    justify-content: center;

  .card-wrap {
    position: relative;
    width: 100%;
    max-width: 720px;
    animation: fadeUp 1s ease 0.6s both;
  }

  /* Decorative corner borders */
  .card-wrap::before, .card-wrap::after,
  .card-inner::before, .card-inner::after {
    content: '';

    width: 24px; height: 24px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.5;
    z-index: 2;
  }
  .card-wrap::before { top: -6px; left: -6px; border-width: 1px 0 0 1px; }
  .card-wrap::after  { top: -6px; right: -6px; border-width: 1px 1px 0 0; }
  .card-inner::before { bottom: -6px; left: -6px; border-width: 0 0 1px 1px; }
  .card-inner::after  { bottom: -6px; right: -6px; border-width: 0 1px 1px 0; }

  .card-inner {
    position: relative;
    background: linear-gradient(135deg,
      rgba(26,10,30,0.9) 0%,
      rgba(14,8,16,0.95) 50%,
      rgba(59,10,42,0.6) 100%);
    border: 1px solid rgba(201,169,110,0.15);
    border-radius: 2px;
    padding: 70px 60px;
    backdrop-filter: blur(20px);
    box-shadow:
      0 0 60px rgba(91,26,58,0.2),
      0 0 120px rgba(59,10,42,0.1),
      inset 0 1px 0 rgba(201,169,110,0.08);
    overflow: hidden;
    min-height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Inner shimmer line */

    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;

  .affirmation-number {

    position: relative;
    z-index: 1;

  .affirmation-text.exiting {
    opacity: 0;
    transform: translateY(-10px);
  }
  .affirmation-text.entering {

  /* Buttons */

    gap: 16px;
    margin-top: 40px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp 1s ease 0.75s both;

  .btn {
    position: relative;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 16px 40px;
    border: none;
    cursor: none;
    transition: all 0.3s ease;
    overflow: hidden;

  .btn-primary {
    background: linear-gradient(135deg, var(--rose-dark), var(--wine));
    color: var(--gold-light);
    border: 1px solid rgba(201,169,110,0.3);
    box-shadow: 0 4px 30px rgba(91,26,58,0.4);
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, var(--blush), var(--rose));
    box-shadow: 0 8px 40px rgba(196,82,122,0.35);
    transform: translateY(-2px);
    color: var(--cream);
  }
  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-primary:hover::before { opacity: 1; }

  .btn-secondary {
    background: transparent;
    color: rgba(245,237,224,0.5);
    border: 1px solid rgba(245,237,224,0.12);
  }
  .btn-secondary:hover {
    border-color: rgba(201,169,110,0.4);
    color: var(--gold-light);
    transform: translateY(-2px);
  }

  /* Progress dots */
  .progress-area {
    margin-top: 28px;
    display: flex;
    gap: 6px;
    align-items: center;
    animation: fadeUp 1s ease 0.9s both;
  }
  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(245,237,224,0.15);
    transition: all 0.3s;
  }
  .dot.active {
    background: var(--gold);
    width: 20px;
    border-radius: 2px;
  }

  /* Counter */
  .counter {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(245,237,224,0.25);
    margin-top: 14px;
    animation: fadeUp 1s ease 0.9s both;
  }

  /* Bottom scrollable list */
  .all-section {
    position: relative;
    z-index: 10;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 20px 100px;
  }

  .section-header {
    text-align: center;
    margin-bottom: 40px;
  }
  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 6px;
    color: var(--gold);
    opacity: 0.6;
    display: block;
    margin-bottom: 10px;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 28px;
    color: rgba(245,237,224,0.5);
  }

  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,169,110,0.4), transparent);
    margin: 20px auto;
  }

  .list-grid {
    display: grid;
    gap: 1px;
  }

  .list-item {
    padding: 18px 24px;
    border-bottom: 1px solid rgba(245,237,224,0.04);
    display: flex;
    gap: 20px;
    align-items: baseline;
    transition: all 0.25s ease;
    cursor: none;
    position: relative;
    overflow: hidden;

  .list-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    background: linear-gradient(90deg, rgba(91,26,58,0.3), transparent);

  .list-item:hover::before { width: 100%; }
  .list-item:hover .item-num { color: var(--gold); }
  .list-item:hover .item-text { color: var(--cream); }

  .item-num {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;

    min-width: 28px;

  .item-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    color: rgba(245,237,224,0.5);

  /* Footer */
  footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 40px 20px;
    border-top: 1px solid rgba(245,237,224,0.05);
  }
  .footer-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: rgba(245,237,224,0.2);
    letter-spacing: 2px;

  .footer-mark {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 4px;
    color: rgba(201,169,110,0.25);
    margin-top: 8px;
    display: block;

  /* Sparkle particles */
  .sparkle {
    position: fixed;
    width: 3px; height: 3px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 5;
    animation: sparkle-fly 1.2s ease-out forwards;
  }
  @keyframes sparkle-fly {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
  }

  /* Scroll reveal */
  .reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .reveal.shown { opacity: 1; transform: translateY(0); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Floating petal */
  @keyframes petal-fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }
  .petal {
    position: fixed;
    font-size: 10px;
    pointer-events: none;
    z-index: 3;
    animation: petal-fall linear infinite;
    color: var(--rose);
    opacity: 0;
  }

  @media (max-width: 600px) {
    .card-inner { padding: 44px 28px; }
    .btn { padding: 14px 28px; }
  }
</style>
</head>

let shuffled = [...affirmations];
let current = 0;
let isAnimating = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Init shuffled
shuffle(shuffled);

function updateCard(text, index, total) {
  const textEl = document.getElementById('affText');
  const numEl = document.getElementById('affNum');
  const counter = document.getElementById('counter');

  textEl.classList.remove('visible');
  textEl.classList.add('exiting');

  setTimeout(() => {
    document.getElementById('affContent').textContent = text;
    numEl.textContent = String(index + 1).padStart(3, '0');
    counter.textContent = `${index + 1} of ${total}`;
    textEl.classList.remove('exiting');
    textEl.classList.add('entering');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        textEl.classList.remove('entering');
        textEl.classList.add('visible');
      });
    });
    updateDots(index, total);
    isAnimating = false;
  }, 350);
}

function updateDots(idx, total) {
  const dots = document.getElementById('progressDots');
  dots.innerHTML = '';
  const show = Math.min(total, 9);
  const mid = Math.floor(show / 2);
  const start = Math.max(0, Math.min(idx - mid, total - show));
  for (let i = start; i < start + show && i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === idx ? ' active' : '');
    dots.appendChild(d);
  }
}

function nextAffirmation() {
  if (isAnimating) return;
  isAnimating = true;
  spawnSparkles();
  current = (current + 1) % shuffled.length;
  updateCard(shuffled[current], current, shuffled.length);
}

function shuffleAll() {
  if (isAnimating) return;
  isAnimating = true;
  spawnSparkles();
  shuffle(shuffled);
  current = 0;
  updateCard(shuffled[current], current, shuffled.length);
}

function spawnSparkles() {
  const btn = document.getElementById('nextBtn');
  const rect = btn.getBoundingClientRect();
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const dx = (Math.random() - 0.5) * 120;
    const dy = (Math.random() - 0.5) * 80 - 40;
    s.style.cssText = `left:${rect.left + rect.width/2}px;top:${rect.top + rect.height/2}px;--dx:${dx}px;--dy:${dy}px;animation-delay:${i*0.05}s`;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1400);
  }
}

// Build list
const grid = document.getElementById('listGrid');
affirmations.forEach((a, i) => {
  const row = document.createElement('div');
  row.className = 'list-item reveal';
  row.innerHTML = `<span class="item-num">${String(i+1).padStart(2,'0')}</span><span class="item-text">${a}</span>`;
  row.onclick = () => {
    if (isAnimating) return;
    isAnimating = true;
    spawnSparkles();
    updateCard(a, i, affirmations.length);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
  grid.appendChild(row);
});

// Initial state
updateCard(shuffled[0], 0, shuffled.length);

// Cursor
const cur = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cur.style.left = mx + 'px';
  cur.style.top = my + 'px';
});

function animateCursor() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px';
  ring.style.top = ry + 'px';
  requestAnimationFrame(animateCursor);
}
animateCursor();

document.querySelectorAll('.btn, .list-item').forEach(el => {
  el.addEventListener('mouseenter', () => {
    ring.style.width = '50px';
    ring.style.height = '50px';
    ring.style.borderColor = 'rgba(201,169,110,0.7)';
  });
  el.addEventListener('mouseleave', () => {
    ring.style.width = '32px';
    ring.style.height = '32px';
    ring.style.borderColor = 'rgba(201,169,110,0.4)';
  });
});

// Scroll reveal
const io = new IntersectionObserver(entries => {
  entries.forEach((e, i) => {
    if (e.isIntersecting) {
      setTimeout(() => e.target.classList.add('shown'), i * 20);
      io.unobserve(e.target);
    }
  });
}, { threshold: 0.08 });

document.querySelectorAll('.reveal').forEach(el => io.observe(el));

// Keyboard
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowRight') { e.preventDefault(); nextAffirmation(); }
});
</script>
</body>
</html>
